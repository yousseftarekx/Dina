  <!-- App shell -->

    <header id="nav">
      <a class="brand" href="#/home" data-link>

    <div id="scroll-progress" aria-hidden="true"><span></span></div>

    <main id="view" tabindex="-1"></main>

    <!-- Floating music player -->
    <div id="player" class="glass" data-collapsed="true" aria-label="Music player">
      <button id="player-toggle" class="player-fab" aria-label="Open music player">
        <span class="eq"><i></i><i></i><i></i><i></i></span>
      </button>
      <div class="player-body">
        <div class="player-art">
          <div class="player-disc"><span></span></div>
        </div>
        <div class="player-meta">
          <p class="player-song" id="player-song">—</p>
          <p class="player-artist" id="player-artist">dos play</p>

          <div class="player-time"><span id="t-cur">0:00</span><span id="t-dur">0:00</span></div>
        </div>
        <div class="player-controls">
          <button id="prev" aria-label="Previous">⏮</button>
          <button id="play" class="play" aria-label="Play">▶</button>
          <button id="next" aria-label="Next">⏭</button>
        </div>
        <div class="player-vol">
          <span aria-hidden="true">♪</span>
          <input id="vol" type="range" min="0" max="100" value="70" aria-label="Volume" />
        </div>
        <ul class="player-list" id="player-list"></ul>
      </div>
    </div>

    <button id="to-top" aria-label="Back to top">↑</button>
  </div>

  <audio id="audio" preload="none"></audio>

  <!-- Lightbox -->
  <div id="lightbox" hidden>
    <button class="lb-close" aria-label="Close">✕</button>
    <button class="lb-prev" aria-label="Previous">‹</button>
    <figure class="lb-fig"><img id="lb-img" alt="" /><figcaption id="lb-cap"></figcaption></figure>
    <button class="lb-next" aria-label="Next">›</button>

  <div id="toast" aria-live="polite"></div>
